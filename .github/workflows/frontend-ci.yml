name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'errandguy-mobile/**'
  push:
    branches: [main]
    paths:
      - 'errandguy-mobile/**'

defaults:
  run:
    working-directory: errandguy-mobile

jobs:
  test:
    name: Jest Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: errandguy-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: errandguy-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

  preview-build:
    name: EAS Preview Build
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: errandguy-mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build preview (Android APK)
        run: eas build --platform android --profile preview --non-interactive

  production-build:
    name: EAS Production Build
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: errandguy-mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build production (Android + iOS)
        run: |
          eas build --platform android --profile production --non-interactive
          eas build --platform ios --profile production --non-interactive

      - name: Submit to stores
        run: |
          eas submit --platform android --profile production --non-interactive
          eas submit --platform ios --profile production --non-interactive
